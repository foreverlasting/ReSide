name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build · ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [arch, fedora]
    container:
      image: ${{ matrix.distro == 'arch' && 'archlinux:latest' || 'fedora:latest' }}
    steps:
      - name: Install system deps (Arch)
        if: matrix.distro == 'arch'
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel nodejs npm curl \
            webkit2gtk-4.1 libsoup3 usbmuxd libimobiledevice libnotify \
            openssl git

      - name: Install system deps (Fedora)
        if: matrix.distro == 'fedora'
        run: |
          dnf install -y gcc gcc-c++ make nodejs npm curl \
            webkit2gtk4.1-devel libsoup3-devel usbmuxd libimobiledevice \
            libnotify openssl-devel git

      # Pin pnpm to one version on every distro. Distro packages (pacman) and
      # `npm install -g pnpm` (latest) drift apart, and pnpm 10 vs 11 disagree on
      # where build-script approvals live — that drift is what broke the Fedora job.
      - name: Setup pnpm (pinned)
        run: |
          npm install -g pnpm@10.33.4
          pnpm --version

      - uses: actions/checkout@v5

      # Install Rust via rustup so every distro gets the exact toolchain pinned in
      # rust-toolchain.toml (channel + rustfmt + clippy), instead of whatever the
      # distro packages happen to ship. Must run after checkout so rustup can read
      # the toolchain file. `rustup show` materializes the toolchain + components.
      - name: Setup Rust (pinned)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --no-modify-path --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" show

      - name: Frontend build
        working-directory: crates/tauri-app
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: core tests
        run: cargo test -p reside-core

      - name: workspace build
        run: cargo build --workspace
